name: CI — Validate

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dev dependencies
        run: npm ci

      - name: Lint HTML with HTMLHint
        run: npm run lint:html

      - name: Check file size (warn if > 1MB)
        run: |
          SIZE=$(wc -c < src/index.html)
          echo "src/index.html size: ${SIZE} bytes"
          if [ "$SIZE" -gt 1048576 ]; then
            echo "WARNING: index.html exceeds 1MB — consider splitting assets"
          fi

      - name: Verify Supabase keys are not hardcoded
        run: |
          if grep -q "YOUR_SUPABASE_URL\|YOUR_SUPABASE_ANON_KEY" src/index.html; then
            echo "OK: Supabase config is in placeholder/mock mode"
          else
            echo "WARNING: Supabase keys appear to be hardcoded — ensure they are not secrets"
          fi
